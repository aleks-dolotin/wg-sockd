# Release workflow for wg-sockd
# Triggers on tag push (v*)
# Sequential DAG: test → build-ui → build-binaries → release → docker-push → helm-push
#
# TODO(RT-1): Pin all actions by SHA before first production use.
#   Run: npx pin-github-action .github/workflows/release.yml

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # RT-2: GitHub Release creation
  packages: write   # RT-2: GHCR push (Docker + Helm)

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Test (gate job — WR-2)
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10  # PM-3
    outputs:
      version: ${{ steps.version.outputs.version }}  # PM-1

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: '**/go.sum'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ui/web/package-lock.json'

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Test agent
        run: cd agent && go test ./...

      - name: Test ui-proxy
        run: cd ui && go test ./...

      - name: Test ctl
        run: cd cmd/wg-sockd-ctl && go test ./...

      - name: Lint UI
        run: cd ui/web && npm ci && npm run lint

  # ──────────────────────────────────────────────
  # Job 2: Build React UI (ADR-4)
  # ──────────────────────────────────────────────
  build-ui:
    name: Build UI
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10  # PM-3

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ui/web/package-lock.json'

      - name: Build React SPA
        run: cd ui/web && npm ci && npm run build

      - name: Upload UI dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: ui-dist
          path: ui/web/dist
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 3: Build Go binaries (ADR-2 matrix)
  # ──────────────────────────────────────────────
  build-binaries:
    name: Build Binaries (${{ matrix.goarch }})
    needs: build-ui
    runs-on: ubuntu-latest
    timeout-minutes: 15  # PM-3
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Download UI dist artifact
        uses: actions/download-artifact@v5
        with:
          name: ui-dist
          path: agent/cmd/wg-sockd/ui_dist

      # PM-2: Verify ui-dist artifact is not empty
      - name: Verify UI dist
        run: |
          ls agent/cmd/wg-sockd/ui_dist/index.html || {
            echo "ERROR: ui-dist artifact missing or empty — build-full would produce empty UI"
            exit 1
          }

      - name: Build agent (lean)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cd agent
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o $GITHUB_WORKSPACE/wg-sockd-linux-${{ matrix.goarch }} \
            ./cmd/wg-sockd/

      - name: Build agent-full (embedded UI)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cd agent
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -tags embed_ui -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE} -X main.buildTags=ui" \
            -o $GITHUB_WORKSPACE/wg-sockd-full-linux-${{ matrix.goarch }} \
            ./cmd/wg-sockd/

      - name: Build CLI
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cd cmd/wg-sockd-ctl
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o $GITHUB_WORKSPACE/wg-sockd-ctl-linux-${{ matrix.goarch }} \
            .

      - name: Upload binaries
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.goarch }}
          path: |
            wg-sockd-linux-${{ matrix.goarch }}
            wg-sockd-full-linux-${{ matrix.goarch }}
            wg-sockd-ctl-linux-${{ matrix.goarch }}
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 4: Create GitHub Release (WR-3)
  # ──────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 5  # PM-3

    steps:
      - uses: actions/checkout@v6

      - name: Download amd64 binaries
        uses: actions/download-artifact@v5
        with:
          name: binaries-amd64
          path: dist/

      - name: Download arm64 binaries
        uses: actions/download-artifact@v5
        with:
          name: binaries-arm64
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          for f in wg-sockd-*; do
            sha256sum "$f" > "${f}.sha256"
          done
          echo "=== Individual checksums ==="
          cat *.sha256
          echo "=== Combined checksums ==="
          sha256sum wg-sockd-* | grep -v '\.sha256' > checksums.txt
          cat checksums.txt

      # PM-5: Idempotent release creation
      - name: Delete existing release (if re-push)
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/* \
            --generate-notes \
            --title "wg-sockd ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 5: Docker image push (ADR-5, RT-5)
  # ──────────────────────────────────────────────
  docker-push:
    name: Docker Push
    needs: [test, release]
    runs-on: ubuntu-latest
    timeout-minutes: 20  # PM-3: QEMU arm64 is slow

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # RT-5: Dual-tagging (semver + latest)
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: ui
          file: ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.test.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/aleks-dolotin/wg-sockd-ui:${{ needs.test.outputs.version }}
            ghcr.io/aleks-dolotin/wg-sockd-ui:latest

  # ──────────────────────────────────────────────
  # Job 6: Helm chart OCI push (ADR-6, RT-4)
  # ──────────────────────────────────────────────
  helm-push:
    name: Helm Push
    needs: [test, docker-push]
    runs-on: ubuntu-latest
    timeout-minutes: 5  # PM-3

    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

      # RT-4: Sync Chart.yaml version from git tag
      - name: Update Chart.yaml version
        run: |
          VERSION="${{ needs.test.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/Chart.yaml
          echo "=== Updated Chart.yaml ==="
          head -10 chart/Chart.yaml

      - name: Package Helm chart
        run: helm package chart/

      - name: Push Helm chart to GHCR
        run: |
          VERSION="${{ needs.test.outputs.version }}"
          helm push "wg-sockd-ui-${VERSION}.tgz" oci://ghcr.io/aleks-dolotin/charts
