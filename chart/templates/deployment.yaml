apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: wg-sockd-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: wg-sockd-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wg-sockd-ui
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.prometheus.enabled }}
      annotations:
        prometheus.io/scrape: "{{ .Values.prometheus.enabled }}"
        prometheus.io/path: "{{ .Values.prometheus.path }}"
        prometheus.io/port: "{{ .Values.prometheus.port }}"
      {{- end }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName | quote }}
      {{- else if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: wg-sockd-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--socket"
            - "{{ .Values.socketDir }}wg-sockd.sock"
            - "--web-dir"
            - "/web/dist"
            - "--listen"
            - ":{{ .Values.containerPort }}"
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
            {{- if .Values.prometheus.enabled }}
            - name: mgmt
              containerPort: {{ .Values.prometheus.port }}
              protocol: TCP
            {{- end }}
          env:
            {{- if .Values.auth.basic.enabled }}
            - name: WG_SOCKD_AUTH_BASIC_ENABLED
              value: "true"
            - name: WG_SOCKD_AUTH_BASIC_USERNAME
              value: {{ .Values.auth.basic.username | quote }}
            {{- end }}
            {{- if .Values.auth.token.enabled }}
            - name: WG_SOCKD_AUTH_TOKEN_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.auth.sessionTtl }}
            - name: WG_SOCKD_AUTH_SESSION_TTL
              value: {{ .Values.auth.sessionTtl | quote }}
            {{- end }}
            - name: WG_SOCKD_AUTH_SKIP_UNIX_SOCKET
              value: {{ .Values.auth.skipUnixSocket | quote }}
            - name: WG_SOCKD_AUTH_SECURE_COOKIES
              value: {{ .Values.auth.secureCookies | quote }}
            - name: WG_SOCKD_AUTH_MAX_SESSIONS
              value: {{ .Values.auth.maxSessions | quote }}
          {{- $secretName := .Values.auth.secretName | default (printf "%s-auth" .Release.Name) }}
          {{- if or .Values.auth.basic.enabled .Values.auth.token.enabled }}
          envFrom:
            - secretRef:
                name: {{ $secretName }}
          {{- end }}
          {{- if .Values.securityContext }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: wg-sockd-socket
              mountPath: {{ .Values.socketDir }}
              readOnly: false
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /ui/status
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ui/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: wg-sockd-socket
          hostPath:
            path: {{ .Values.socketDir }}
            type: Directory

