{{/*
  Auto-generated auth Secret for convenience.
  Only created when auth.secretName is empty (no external Secret provided)
  AND at least one auth method is enabled.
  For production, create your own Secret and set auth.secretName.
*/}}
{{- if and (not .Values.auth.secretName) (or .Values.auth.basic.enabled .Values.auth.token.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth
  labels:
    app.kubernetes.io/name: wg-sockd-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  {{- if .Values.auth.basic.enabled }}
  {{- if .Values.auth.basic.password_hash }}
  WG_SOCKD_AUTH_BASIC_PASSWORD_HASH: {{ .Values.auth.basic.password_hash | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.auth.token.enabled }}
  {{- if .Values.auth.token.token }}
  WG_SOCKD_AUTH_TOKEN: {{ .Values.auth.token.token | quote }}
  {{- end }}
  {{- end }}
{{- end }}
