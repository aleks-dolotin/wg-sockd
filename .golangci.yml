# golangci-lint v2 configuration for wg-sockd
# Used by CI workflow (.github/workflows/ci.yml)
# Runs across all 3 Go modules: agent/, ui/, cmd/wg-sockd-ctl/

version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

issues:
  exclude-rules:
    # Allow unchecked errors in test files
    - path: _test\.go
      linters:
        - errcheck
